<html lang="de">
<head>
<meta charset="utf-8" />

<title>Ladekompass</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; background: #06080F; }
  button { cursor: pointer; border: none; background: none; color: inherit; font-family: inherit; }
  a { text-decoration: none; }
  input { font-family: inherit; }
  .sc::-webkit-scrollbar { width: 0; }
  .hsc::-webkit-scrollbar { height: 0; }
  @keyframes rise { from { opacity:0; transform: translateY(10px);} to { opacity:1; transform:none;} }
  @keyframes glowpulse { 0%,100%{ box-shadow:0 0 0 1px #FBBF3B, 0 0 22px -6px #FBBF3B66;} 50%{ box-shadow:0 0 0 1px #FFD874, 0 0 32px -3px #FBBF3B88;} }

  .best { animation: glowpulse 3.2s ease-in-out infinite; }
  .spin { animation: spin .7s linear infinite; }
  .press:active { transform: scale(.985); transition: transform .08s; }
  #root { min-height: 100vh; }
  .boot { color:#98A0BC; font-family: 'Inter', sans-serif; text-align:center; padding:80px 20px; }
</style>

/* ---- data layer ---- */

// operator price profiles (€/kWh) + block-fee threshold in minutes
const PROFILE = {
  "EnBW":            { adhoc:.69, enbw:.49, adac:.57, shell:.64, block:240 },
  "Aral pulse":      { adhoc:.75, adac:.59, enbw:.61, shell:.64, block:45 },
  "Ionity":          { adhoc:.79, enbw:.59, adac:.59, block:60 },
  "Allego":          { adhoc:.68, enbw:.55, adac:.58, shell:.62, block:45 },
  "Shell Recharge":  { adhoc:.72, shell:.49, enbw:.60, adac:.61, block:60 },
  "EWE Go":          { adhoc:.65, ewego:.48, enbw:.59, adac:.60, block:180 },
  "Fastned":         { adhoc:.69, enbw:.57, adac:.60, shell:.59, block:9999 },
  "Tesla":           { adhoc:.60, enbw:.58, adac:.62, block:9999 },
  "TotalEnergies":   { adhoc:.69, enbw:.59, adac:.62, block:60 },
  "Freshmile":       { adhoc:.72, enbw:.60, adac:.61, shell:.66, block:90 },
  "Pfalzwerke":      { adhoc:.64, enbw:.59, adac:.60, block:120 },
};
function mk(id, op, venue, city, country, lat, lng, power, free, total) {
  const pf = PROFILE[op], block = pf.block ?? 120, tariffs = {};
  Object.keys(pf).forEach((k) => {
    if (k !== "block") tariffs[k] = { kwh: pf[k], session: 0, blockAfter: block, blockPerMin: 0.10 };
  });
  return { id, operator: op, venue, city, country, lat, lng, power, plug: "CCS", free, total, tariffs };
}

const DATA = [
  // Saarland + Südwest
  mk("enbw-schmelz","EnBW","Marktplatz","Schmelz","DE",49.443,6.851,150,2,2),
  mk("aral-lebach","Aral pulse","Netto","Lebach","DE",49.411,6.911,150,1,2),
  mk("shell-dln","Shell Recharge","Globus","Dillingen","DE",49.356,6.727,150,1,2),
  mk("enbw-sb","EnBW","City","Saarbrücken","DE",49.240,6.997,300,3,4),
  mk("ionity-sb","Ionity","A6 Rasthof","Saarbrücken","DE",49.230,7.030,350,4,6),
  mk("enbw-tr","EnBW","Zentrum","Trier","DE",49.750,6.637,150,2,2),

  // Berlin
  mk("enbw-ber","EnBW","Alexanderplatz","Berlin","DE",52.521,13.413,300,5,8),
  mk("allego-ber","Allego","Tempelhof","Berlin","DE",52.470,13.403,175,2,4),
  mk("tesla-ber","Tesla","Marzahn","Berlin","DE",52.545,13.560,250,6,12),
  // Hamburg
  mk("enbw-ham","EnBW","HafenCity","Hamburg","DE",53.541,9.999,300,2,6),

  mk("enbw-muc","EnBW","Messe","München","DE",48.135,11.582,300,4,8),
  mk("ionity-muc","Ionity","A9 Nord","München","DE",48.230,11.600,350,3,6),
  mk("tesla-muc","Tesla","Freiham","München","DE",48.150,11.400,250,8,16),
  // Köln / Bonn / NRW
  mk("aral-cgn","Aral pulse","Zentrum","Köln","DE",50.938,6.960,300,2,4),
  mk("enbw-cgn","EnBW","Deutz","Köln","DE",50.938,6.975,150,2,2),
  mk("enbw-bn","EnBW","Zentrum","Bonn","DE",50.735,7.100,150,2,2),
  mk("fastned-dus","Fastned","Flughafen","Düsseldorf","DE",51.278,6.767,300,3,6),
  mk("enbw-dus","EnBW","Medienhafen","Düsseldorf","DE",51.216,6.757,150,2,2),
  mk("aral-dtm","Aral pulse","Phoenix","Dortmund","DE",51.492,7.510,150,1,2),
  mk("enbw-ess","EnBW","Zentrum","Essen","DE",51.458,7.014,150,2,2),
  mk("enbw-ms","EnBW","Hafen","Münster","DE",51.960,7.626,150,2,2),
  // Frankfurt / Mitte
  mk("enbw-fra","EnBW","Messe","Frankfurt","DE",50.112,8.651,300,5,8),
  mk("ionity-fra","Ionity","A5 Süd","Frankfurt","DE",50.020,8.560,350,3,6),
  mk("enbw-ks","EnBW","Zentrum","Kassel","DE",51.312,9.480,150,2,2),
  // Stuttgart / BaWü
  mk("enbw-stg","EnBW","Zuffenhausen","Stuttgart","DE",48.832,9.170,300,4,6),
  mk("allego-stg","Allego","Vaihingen","Stuttgart","DE",48.728,9.113,175,1,3),
  mk("enbw-ka","EnBW","Durlach","Karlsruhe","DE",49.007,8.470,300,4,6),
  mk("pfalz-ma","Pfalzwerke","Innenstadt","Mannheim","DE",49.489,8.469,150,2,2),
  mk("enbw-fr","EnBW","Zentrum","Freiburg","DE",47.999,7.842,150,2,2),
  // Ost
  mk("enbw-lej","EnBW","Zentrum","Leipzig","DE",51.340,12.375,150,2,2),
  mk("ionity-lej","Ionity","A9 Ost","Leipzig","DE",51.300,12.300,350,4,6),
  mk("enbw-dd","EnBW","Neustadt","Dresden","DE",51.060,13.745,150,2,2),
  mk("enbw-ef","EnBW","Zentrum","Erfurt","DE",50.984,11.030,150,2,2),
  // Nord
  mk("enbw-h","EnBW","Messe","Hannover","DE",52.320,9.808,300,3,6),
  mk("aral-h","Aral pulse","List","Hannover","DE",52.395,9.750,150,1,2),
  mk("ewego-hb","EWE Go","Überseestadt","Bremen","DE",53.108,8.760,150,2,2),
  mk("enbw-ki","EnBW","Hafen","Kiel","DE",54.323,10.135,150,2,2),
  mk("ewego-hro","EWE Go","Hafen","Rostock","DE",54.092,12.099,150,1,2),
  // Bayern Nord
  mk("enbw-nue","EnBW","Zentrum","Nürnberg","DE",49.452,11.077,150,2,2),
];

/* ---- engine ---- */
function haversine(a, b) {
  const R = 6371, toR = Math.PI / 180;
  const dLat = (b.lat - a.lat) * toR, dLng = (b.lng - a.lng) * toR;
  const s = Math.sin(dLat/2)**2 + Math.cos(a.lat*toR)*Math.cos(b.lat*toR)*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}
const sessionMinutes = (kWh, power) => Math.max(1, Math.round((kWh / (power * 0.75)) * 60));
const costOf = (t, kWh, power) =>
  t.kwh*kWh + t.session + Math.max(0, sessionMinutes(kWh, power) - t.blockAfter) * t.blockPerMin;
function rankTariffs(station, held, kWh) {
  const ids = ["adhoc", ...Object.keys(PROVIDERS).filter((p) => p !== "adhoc" && held.includes(p))];
  return ids.filter((id) => station.tariffs[id])
    .map((id) => ({ id, t: station.tariffs[id], total: costOf(station.tariffs[id], kWh, station.power) }))
    .sort((a, b) => a.total - b.total);
}
const euro = (n) => "€ " + n.toFixed(2).replace(".", ",");
const perKwh = (n) => n.toFixed(2).replace(".", ",") + " €";
const fmtKm = (k) => (k < 10 ? k.toFixed(1) : Math.round(k)) + " km";
const priceColor = (k) => (k <= 0.54 ? C.green : k <= 0.66 ? C.gold : C.red);
const gmapsDir = (s) => `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`;
const gmapsEmbed = (s) => `https://www.google.com/maps?q=${s.lat},${s.lng}&z=15&output=embed`;

const display = { fontFamily: "'Space Grotesk', sans-serif" };
const mono = { fontFamily: "'Space Mono', monospace" };
const LIMIT = 20;

/* ============================ App ============================ */
function App() {
  const [screen, setScreen] = useState("list");
  const [active, setActive] = useState(null);
  const [held, setHeld] = useState(["enbw", "adac"]);
  const [kWh, setKWh] = useState(30);
  const [loc, setLoc] = useState(LOCATIONS[0]);
  const [onlyFree, setOnlyFree] = useState(false);
  const [query, setQuery] = useState("");
  const [synced, setSynced] = useState(() => new Date());
  const [syncing, setSyncing] = useState(false);
  const [avail, setAvail] = useState(() => Object.fromEntries(DATA.map((s) => [s.id, s.free])));

  const refresh = () => {
    setSyncing(true);
    setTimeout(() => {
      setAvail(Object.fromEntries(DATA.map((s) => {
        const j = Math.round((Math.random() - 0.45) * 2);
        return [s.id, Math.max(0, Math.min(s.total, s.free + j))];
      })));
      setSynced(new Date()); setSyncing(false);
    }, 650);
  };

  const { list, totalMatches } = useMemo(() => {
    let l = DATA.map((s) => ({ ...s, km: haversine(loc, s), freeNow: avail[s.id], best: rankTariffs(s, held, kWh)[0] }));
    if (onlyFree) l = l.filter((s) => s.freeNow > 0);
    if (query.trim()) {
      const q = query.toLowerCase();
      l = l.filter((s) => (s.city + s.operator + s.venue + s.country).toLowerCase().includes(q));
    }
    l.sort((a, b) => a.km - b.km);
    const total = l.length;
    l = l.slice(0, LIMIT);
    const cheapest = l.reduce((m, s) => (!m || s.best.t.kwh < m.best.t.kwh ? s : m), null);
    l = l.map((s) => ({ ...s, cheapNearby: cheapest && s.id === cheapest.id }));
    return { list: l, totalMatches: total };
  }, [held, kWh, loc, onlyFree, query, avail]);

  const activeStation = active ? (list.find((s) => s.id === active.id) || active) : null;
  const font = { fontFamily: "'Inter', system-ui, sans-serif" };

  return (
    <div style={{ ...font, minHeight: "100vh", background: "#06080F", display: "flex", justifyContent: "center", color: C.text }}>
      <div className="sc" style={{
        width: "100%", maxWidth: 440, minHeight: "100vh", background: C.bg, position: "relative",
        overflowX: "hidden", paddingBottom: 92,
        backgroundImage: "radial-gradient(130% 50% at 50% -10%, #232A5533 0%, transparent 55%)" }}>
        {screen === "list" && (
          <ListView {...{ list, totalMatches, kWh, setKWh, loc, setLoc, onlyFree, setOnlyFree, query, setQuery,
            held, synced, syncing, refresh, open: (s) => { setActive(s); setScreen("detail"); }, goCards: () => setScreen("cards") }} />
        )}
        {screen === "detail" && activeStation && (
          <DetailView {...{ station: activeStation, held, kWh, setKWh, back: () => setScreen("list") }} />
        )}
        {screen === "cards" && <CardsView {...{ held, setHeld, back: () => setScreen("list") }} />}
        {screen !== "cards" && <TabBar screen={screen} onHome={() => setScreen("list")} onCards={() => setScreen("cards")} />}
      </div>
    </div>
  );
}

function ListView({ list, totalMatches, kWh, setKWh, loc, setLoc, onlyFree, setOnlyFree, query, setQuery, held, synced, syncing, refresh, open, goCards }) {
  const time = synced.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
  return (
    <div>
      <div style={{ padding: "20px 18px 10px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 32, height: 32, borderRadius: 10, background: `linear-gradient(135deg, ${C.gold}, ${C.violet})`, display: "grid", placeItems: "center" }}>
            <Ic n="navigation" s={17} c="#0B1020" sw={2.6} />
          </div>
          <span style={{ ...display, fontWeight: 700, fontSize: 20, letterSpacing: -0.4 }}>Ladekompass</span>
        </div>
        <button className="press" onClick={goCards} style={{ display: "flex", alignItems: "center", gap: 6, background: C.glassHi, border: `1px solid ${C.border}`, padding: "7px 12px", borderRadius: 999, fontSize: 12.5, color: C.muted }}>
          <Ic n="card" s={14} /> {held.length}
        </button>
      </div>

      <div style={{ padding: "0 18px 4px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 7, color: C.muted, fontSize: 12, marginBottom: 8 }}>
          <Ic n="crosshair" s={13} c={C.green} /><span>Dein Standort</span>
          <span style={{ ...mono, fontSize: 11, marginLeft: "auto", color: syncing ? C.gold : C.muted }}>
            <button className="press" onClick={refresh} style={{ display: "inline-flex", alignItems: "center", gap: 5, color: "inherit" }}>
              <span className={syncing ? "spin" : ""} style={{ display: "inline-flex" }}><Ic n="refresh" s={11} /></span> {syncing ? "Sync…" : time}
            </button>
          </span>
        </div>
        <div className="hsc" style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 2 }}>
          {LOCATIONS.map((l) => {
            const on = l.id === loc.id;
            return <button key={l.id} className="press" onClick={() => setLoc(l)}
              style={{ flexShrink: 0, padding: "8px 14px", borderRadius: 999, fontSize: 13, fontWeight: 600, background: on ? C.text : C.glass, color: on ? "#0B1020" : C.muted, border: `1px solid ${on ? C.text : C.border}` }}>{l.label}</button>;
          })}
        </div>
        <div style={{ fontSize: 10.5, color: C.muted, marginTop: 7 }}>Im echten App automatisch per GPS. Hier als Orte wählbar.</div>
      </div>

      <div style={{ padding: "14px 16px 0" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 9, background: C.glass, border: `1px solid ${C.border}`, borderRadius: 13, padding: "10px 13px" }}>
          <Ic n="search" s={16} c={C.muted} />
          <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Stadt, Land oder Anbieter …"
            style={{ flex: 1, background: "none", border: "none", outline: "none", color: C.text, fontSize: 14.5 }} />
          {query && <button onClick={() => setQuery("")}><Ic n="x" s={15} c={C.muted} /></button>}
        </div>
      </div>

      <div style={{ padding: "14px 16px 6px", display: "flex", gap: 8 }}>
        {[10, 30, 50].map((v) => (
          <button key={v} className="press" onClick={() => setKWh(v)}
            style={{ flex: 1, padding: "9px 0", borderRadius: 11, fontSize: 13.5, fontWeight: 600, background: kWh === v ? C.gold : C.glass, color: kWh === v ? "#0B1020" : C.muted, border: `1px solid ${kWh === v ? C.gold : C.border}` }}>{v} kWh</button>
        ))}
        <button className="press" onClick={() => setOnlyFree((v) => !v)}
          style={{ flex: 1.2, padding: "9px 0", borderRadius: 11, fontSize: 13, fontWeight: 600, background: onlyFree ? C.green : C.glass, color: onlyFree ? "#0B1020" : C.muted, border: `1px solid ${onlyFree ? C.green : C.border}` }}>nur frei</button>
      </div>

      <div style={{ padding: "8px 16px 6px" }}>
        {list.length === 0 && (
          <div style={{ padding: "34px 20px", textAlign: "center", borderRadius: 16, background: C.glass, border: `1px solid ${C.border}`, color: C.muted, fontSize: 13.5 }}>
            Nichts gefunden. Setz „nur frei“ zurück oder ändere die Suche.
          </div>
        )}
        {list.map((s, i) => <StationCard key={s.id} s={s} kWh={kWh} onClick={() => open(s)} delay={i * 0.02} />)}
      </div>
      {list.length > 0 && (
        <p style={{ ...mono, color: C.muted, fontSize: 11, textAlign: "center", paddingBottom: 6 }}>
          {list.length} von {totalMatches} Säulen · nächste zuerst
        </p>
      )}
      <p style={{ color: C.muted, fontSize: 10.5, textAlign: "center", padding: "0 30px 8px", lineHeight: 1.55 }}>
        Prototyp mit Beispieldaten quer durch Deutschland. Im Betrieb komplett automatisch aus dem Ladesäulenregister der Bundesnetzagentur, Tarife via OCPI.
      </p>
    </div>
  );
}

function StationCard({ s, kWh, onClick, delay }) {
  const busy = s.freeNow === 0, best = s.best, col = priceColor(best.t.kwh);
  return (
    <button className="press rise" onClick={onClick}
      style={{ width: "100%", textAlign: "left", marginBottom: 10, padding: 15, borderRadius: 17,
        background: s.cheapNearby ? `linear-gradient(135deg, ${C.green}14, ${C.glass})` : C.glass,
        border: `1px solid ${s.cheapNearby ? C.green + "55" : C.border}`, display: "block", animationDelay: `${delay}s` }}>
      {s.cheapNearby && (
        <div style={{ fontSize: 10, fontWeight: 700, color: C.green, letterSpacing: 0.3, marginBottom: 8, display: "inline-flex", alignItems: "center", gap: 5 }}>
          <Ic n="trend" s={12} /> GÜNSTIGSTE IN DER NÄHE
        </div>
      )}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
        <div style={{ minWidth: 0 }}>
          <div style={{ ...display, fontWeight: 600, fontSize: 15.5, lineHeight: 1.2 }}>{s.city} · {s.venue}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 7, marginTop: 7, flexWrap: "wrap" }}>
            <span style={{ fontSize: 11, fontWeight: 600, color: C.violet, background: `${C.violet}22`, padding: "2px 8px", borderRadius: 999 }}>{s.operator}</span>
            <span style={{ color: C.muted, fontSize: 12, display: "inline-flex", alignItems: "center", gap: 3 }}><Ic n="zap" s={11} />{s.power} kW</span>
            <span style={{ color: C.muted, fontSize: 12, display: "inline-flex", alignItems: "center", gap: 3 }}><Ic n="pin" s={11} />{fmtKm(s.km)}</span>
          </div>
        </div>
        <div style={{ textAlign: "right", flexShrink: 0 }}>
          <div style={{ ...mono, fontSize: 17, fontWeight: 700, color: col }}>{perKwh(best.t.kwh)}</div>
          <div style={{ fontSize: 10.5, color: C.muted, marginTop: 2 }}>{best.id === "adhoc" ? "Ad-hoc" : PROVIDERS[best.id].short}</div>
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 12 }}>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, color: busy ? C.red : C.green, fontWeight: 600 }}>
          <span style={{ width: 7, height: 7, borderRadius: 99, background: busy ? C.red : C.green, boxShadow: `0 0 8px ${busy ? C.red : C.green}` }} />
          {busy ? "belegt" : `${s.freeNow}/${s.total} frei`}
        </span>
        <span style={{ ...mono, fontSize: 12, color: C.muted }}>≈ {euro(best.total)} / {kWh} kWh</span>
      </div>
    </button>
  );
}

function DetailView({ station, held, kWh, setKWh, back }) {
  const ranked = rankTariffs(station, held, kWh);
  const busy = station.freeNow === 0, mins = sessionMinutes(kWh, station.power);
  return (
    <div className="rise">
      <div style={{ padding: "16px 16px 0" }}>
        <button className="press" onClick={back} style={{ display: "flex", alignItems: "center", gap: 4, color: C.muted, fontSize: 14 }}>
          <Ic n="chevronLeft" s={18} /> Zurück
        </button>
      </div>
      <div style={{ padding: "10px 20px 4px" }}>
        <div style={{ ...display, fontSize: 23, fontWeight: 700, letterSpacing: -0.4, lineHeight: 1.15 }}>{station.city} · {station.venue}</div>
        <div style={{ display: "flex", gap: 18, marginTop: 12 }}>
          <div>
            <div style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 0.6 }}>Anbieter</div>
            <div style={{ ...display, fontSize: 14.5, fontWeight: 600, marginTop: 3, color: C.violet }}>{station.operator}</div>
          </div>
          <div>
            <div style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 0.6 }}>Standort</div>
            <div style={{ ...display, fontSize: 14.5, fontWeight: 600, marginTop: 3 }}>{station.venue}, {station.city}</div>
          </div>
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 14 }}>
          {[
            { i: <Ic n="zap" s={12} />, t: `${station.power} kW · ${station.plug}` },
            { i: <Ic n="pin" s={12} />, t: `${fmtKm(station.km)} · ${station.country}` },
            { i: <span style={{ width: 7, height: 7, borderRadius: 99, background: busy ? C.red : C.green, display: "inline-block" }} />, t: busy ? "belegt" : `${station.freeNow}/${station.total} frei`, c: busy ? C.red : C.green },
          ].map((b, i) => (
            <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 6, background: C.glass, border: `1px solid ${C.border}`, padding: "6px 11px", borderRadius: 999, fontSize: 12.5, color: b.c || C.muted }}>{b.i}{b.t}</span>
          ))}
        </div>
      </div>

      <div style={{ padding: "16px 16px 4px" }}>
        <div style={{ borderRadius: 16, overflow: "hidden", border: `1px solid ${C.border}`, background: "#0F1428" }}>
          <iframe title="Google Maps" src={gmapsEmbed(station)} width="100%" height="190" style={{ border: 0, display: "block" }} loading="lazy" referrerPolicy="no-referrer-when-downgrade" />
        </div>
        <a className="press" href={gmapsDir(station)} target="_blank" rel="noreferrer"
          style={{ marginTop: 10, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: "13px 0", borderRadius: 13, background: C.glassHi, border: `1px solid ${C.border}`, color: C.text, fontWeight: 600, fontSize: 14.5, ...display }}>
          <Ic n="external" s={16} /> In Google Maps öffnen · Route
        </a>
      </div>

      <div style={{ padding: "14px 16px 4px" }}>
        <div style={{ fontSize: 11.5, color: C.muted, marginBottom: 8 }}>Beispiel-Ladung</div>
        <div style={{ display: "flex", gap: 8 }}>
          {[10, 30, 50].map((v) => (
            <button key={v} className="press" onClick={() => setKWh(v)} style={{ flex: 1, padding: "9px 0", borderRadius: 11, fontSize: 13.5, fontWeight: 600, background: kWh === v ? C.gold : C.glass, color: kWh === v ? "#0B1020" : C.muted, border: `1px solid ${kWh === v ? C.gold : C.border}` }}>{v} kWh</button>
          ))}
        </div>
        <div style={{ ...mono, fontSize: 11.5, color: C.muted, marginTop: 8, display: "flex", alignItems: "center", gap: 6 }}>
          <Ic n="clock" s={12} /> ca. {mins} Min. bei {station.power} kW
        </div>
      </div>

      <div style={{ padding: "12px 16px 8px" }}>
        <div style={{ fontSize: 11.5, color: C.muted, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
          <Ic n="trend" s={13} /> Dein Preis pro Anbieter
        </div>
        {ranked.map((r, i) => {
          const p = PROVIDERS[r.id], isBest = i === 0, save = ranked[ranked.length - 1].total - r.total;
          return (
            <div key={r.id} className={isBest ? "best rise" : "rise"} style={{ marginBottom: 9, padding: "13px 15px", borderRadius: 14, animationDelay: `${i * 0.05}s`, background: isBest ? `linear-gradient(135deg, ${C.gold}1f, ${C.glassHi})` : C.glass, border: `1px solid ${isBest ? "transparent" : C.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ ...display, fontWeight: 600, fontSize: 14.5 }}>{p.name}</span>
                    {isBest && <span style={{ fontSize: 10, fontWeight: 700, color: "#0B1020", background: C.gold, padding: "2px 7px", borderRadius: 999 }}>BESTPREIS</span>}
                  </div>
                  <div style={{ ...mono, fontSize: 11, color: C.muted, marginTop: 5 }}>
                    {perKwh(r.t.kwh)}/kWh{r.t.session ? ` · ${euro(r.t.session)} Start` : ""}{mins > r.t.blockAfter ? " · +Blockier" : ""}
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ ...mono, fontSize: 17, fontWeight: 700, color: isBest ? C.goldHi : C.text }}>{euro(r.total)}</div>
                  {!isBest && save > 0.01 && <div style={{ ...mono, fontSize: 10.5, color: C.red, marginTop: 2 }}>+{euro(save)}</div>}
                  {isBest && ranked.length > 1 && <div style={{ ...mono, fontSize: 10.5, color: C.green, marginTop: 2 }}>günstigste</div>}
                </div>
              </div>
            </div>
          );
        })}
        {ranked.length === 1 && (
          <p style={{ color: C.muted, fontSize: 12, lineHeight: 1.5, marginTop: 4 }}>
            Nur Ad-hoc-Preis, weil noch keine Ladekarte hinterlegt ist. Trag deine Karten ein, um zu vergleichen.
          </p>
        )}
      </div>
    </div>
  );
}

function CardsView({ held, setHeld, back }) {
  const toggle = (id) => setHeld((h) => (h.includes(id) ? h.filter((x) => x !== id) : [...h, id]));
  const list = Object.entries(PROVIDERS).filter(([id]) => id !== "adhoc");
  const Row = ({ label, sub, on, locked, onClick }) => (
    <button className="press" onClick={onClick} disabled={locked}
      style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 15px", marginBottom: 9, borderRadius: 13, background: C.glass, border: `1px solid ${on ? C.green + "66" : C.border}`, opacity: locked ? 0.72 : 1 }}>
      <div style={{ textAlign: "left" }}>
        <div style={{ ...display, fontWeight: 600, fontSize: 14.5 }}>{label}</div>
        {sub && <div style={{ fontSize: 11.5, color: C.muted, marginTop: 3 }}>{sub}</div>}
      </div>
      <div style={{ width: 24, height: 24, borderRadius: 8, display: "grid", placeItems: "center", background: on ? C.green : "transparent", border: `1.5px solid ${on ? C.green : C.muted}` }}>
        {on && <Ic n="check" s={15} c="#0B1020" sw={3} />}
      </div>
    </button>
  );
  return (
    <div className="rise">
      <div style={{ padding: "18px 16px 0" }}>
        <button className="press" onClick={back} style={{ display: "flex", alignItems: "center", gap: 4, color: C.muted, fontSize: 14 }}>
          <Ic n="chevronLeft" s={18} /> Fertig
        </button>
      </div>
      <div style={{ padding: "10px 20px 4px" }}>
        <div style={{ ...display, fontSize: 22, fontWeight: 700, letterSpacing: -0.4 }}>Meine Ladekarten</div>
        <p style={{ color: C.muted, fontSize: 13.5, lineHeight: 1.5, marginTop: 8 }}>Wähl deine Verträge. Ladekompass rechnet an jeder Säule den echten Preis, ad hoc ist immer dabei.</p>
      </div>
      <div style={{ padding: "16px 16px 8px" }}>
        <Row label={PROVIDERS.adhoc.name} sub="immer verfügbar, ohne Vertrag" on locked />
        {list.map(([id, p]) => <Row key={id} label={p.name} on={held.includes(id)} onClick={() => toggle(id)} />)}
      </div>
      <p style={{ padding: "6px 20px", color: C.muted, fontSize: 11.5, lineHeight: 1.5 }}>Später laufen hier automatisch alle Anbieter mit tagesaktuellen Tarifen rein, direkt aus den offenen Ladedaten.</p>
    </div>
  );
}

function TabBar({ screen, onHome, onCards }) {
  const Item = ({ icon, label, active, onClick }) => (
    <button className="press" onClick={onClick} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "9px 0", color: active ? C.gold : C.muted }}>
      {icon}<span style={{ fontSize: 10.5, fontWeight: active ? 600 : 400 }}>{label}</span>
    </button>
  );
  return (
    <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, display: "flex", justifyContent: "center" }}>
      <div style={{ width: "100%", maxWidth: 440, display: "flex", background: "rgba(12,17,34,0.9)", backdropFilter: "blur(14px)", borderTop: `1px solid ${C.border}`, paddingBottom: 6 }}>
        <Item icon={<Ic n="search" s={19} />} label="Finden" active={screen === "list" || screen === "detail"} onClick={onHome} />
        <Item icon={<Ic n="sliders" s={19} />} label="Karten" active={screen === "cards"} onClick={onCards} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
